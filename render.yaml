services:
  - type: web
    name: eduapp-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd ai-backend && npm install
    startCommand: cd ai-backend && node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NVIDIA_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AI_API_KEY
        sync: false
